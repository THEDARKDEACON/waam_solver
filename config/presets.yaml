# waam_twin v2 fidelity presets — grid scales with host VRAM via platform.auto_grid()

minimal:
  vram_budget_mb: 512
  domain_mm: [40, 20, 15]
  target_dx_mm: 0.5
  max_tracers: 5000
  use_srt: true

standard:
  vram_budget_mb: 1536
  domain_mm: [80, 40, 25]
  target_dx_mm: 0.3
  max_tracers: 20000
  use_srt: true

high:
  vram_budget_mb: 8192
  domain_mm: [120, 60, 40]
  target_dx_mm: 0.2
  max_tracers: 50000
  use_srt: false

ultra:
  vram_budget_mb: 16384
  domain_mm: [200, 100, 60]
  target_dx_mm: 0.15
  max_tracers: 100000
  use_srt: false
