name: waam-twin-verify

on:
  push:
    paths:
      - 'waam_twin/**'
      - 'materials/**'
      - 'config/**'
      - 'jobs/**'
      - 'requirements*.txt'
      - '.github/workflows/waam-twin-verify.yml'
  pull_request:
    paths:
      - 'waam_twin/**'
      - 'materials/**'
      - 'config/**'
      - 'jobs/**'
      - 'requirements*.txt'
      - '.github/workflows/waam-twin-verify.yml'

jobs:
  validate-cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-waam.txt jsonschema

      - name: Run core validation suite
        env:
          WAAM_BACKEND: cpu
          WAAM_PRESET: minimal
          PYTHONPATH: .
        run: python3 -m waam_twin.validation.run_all

  validate-full:
    runs-on: ubuntu-latest
    needs: validate-cpu
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-waam.txt jsonschema

      - name: Run full validation (process + soak)
        env:
          WAAM_BACKEND: cpu
          WAAM_PRESET: minimal
          WAAM_FULL_VALIDATION: '1'
          PYTHONPATH: .
        run: python3 -m waam_twin.validation.run_all
